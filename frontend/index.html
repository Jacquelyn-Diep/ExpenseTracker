<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <h1>Expense<br>Tracker</h1>

        <form id="expense-form">
            <label>Description</label>
            <input type="text" id="description" placeholder="Coffee, rent, groceries..." required>

            <label>Amount</label>
            <input type="number" id="amount" placeholder="0.00" step="0.01" required>

            <label>Category</label>
            <input type="text" id="category" placeholder="Food, Bills, Fun..." required>

            <label>Date</label>
            <input type="date" id="date" required>

            <button type="submit">Add Expense</button>
        </form>
    </aside>

    <main class="content">
        <div class="stat-card">
            <span class="stat-label">Total Spent</span>
            <span class="stat-value" id="monthly-total">$0.00</span>
        </div>

        <div class="chart-card">
            <h2>By Category</h2>
            <canvas id="category-chart"></canvas>
        </div>

        <div class="list-card">
            <h2>Recent Expenses</h2>
            <ul id="expense-list"></ul>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
